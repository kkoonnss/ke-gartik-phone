<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="Monday Meeting icon">
  <title>Monday Meeting</title>
  <!-- Dark background -->
  <rect width="32" height="32" rx="6" fill="#0b0b0f"/>
  <!-- Three horizontal agenda lines (meeting agenda) -->
  <rect x="5" y="9"  width="14" height="2.5" rx="1.25" fill="#FFD400"/>
  <rect x="5" y="14" width="10" height="2.5" rx="1.25" fill="#FFD400"/>
  <rect x="5" y="19" width="12" height="2.5" rx="1.25" fill="#FFD400"/>
  <!-- Circle / play button in bottom-right (play button evokes playback / game night) -->
  <circle cx="24" cy="22" r="6" fill="#FF2E63"/>
  <polygon points="22,19.5 22,24.5 27,22" fill="#fff"/>
</svg>
